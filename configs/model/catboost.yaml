name: "catboost"
model_version: "0.0.1"
model_changelog: "tunning"

params:
  iterations: 1000
  eval_metric: "AUC"
  depth: 4
  min_data_in_leaf: 2
  learning_rate: 0.07362846165199796
  l2_leaf_reg: 5.962478772230717
  random_strength: 0.003107620097426215
  bagging_temperature: 0.31710898235849494
  subsample: 0.9289203372057002
  colsample_bylevel: 0.5905634072509229
  one_hot_max_size: 4
  scale_pos_weight: 37.655393618515326


# Передаем не просто границы, а конфигурацию для suggest методы
optuna_search_space:

  # ============================================================
  # СТРУКТУРА ДЕРЕВЬЕВ
  # ============================================================
  depth:
    type: "int"
    bounds: [4, 8]  # Сузили до 8, так как 10 для таблиц часто избыточно и долго учится

  min_data_in_leaf:
    type: "int"
    bounds: [1, 100]  # Регуляризация через минимальный размер листа — важно при сильном дисбалансе

  # ============================================================
  # СКОРОСТЬ ОБУЧЕНИЯ И РЕГУЛЯРИЗАЦИЯ
  # ============================================================
  learning_rate:
    type: "float"
    bounds: [0.01, 0.15]
    log: false

  l2_leaf_reg:
    type: "float"
    bounds: [1.0, 10.0]
    log: false

  random_strength:  # Исправлена опечатка в имени параметра!
    type: "float"
    bounds: [0.001, 2.0]
    log: true

  bagging_temperature:
    type: "float"
    bounds: [0.0, 1.0]  # 0 = детерминированный Bayesian bootstrap, 1 = максимальный шум подвыборки
    log: false

  # ============================================================
  # СЭМПЛИРОВАНИЕ СТРОК/КОЛОНОК
  # ============================================================
  subsample:
    type: "float"
    bounds: [0.6, 1.0]
    log: false

  colsample_bylevel:
    type: "float"
    bounds: [0.5, 1.0]
    log: false

  # ============================================================
  # РАБОТА С КАТЕГОРИАЛЬНЫМИ ПРИЗНАКАМИ
  # ============================================================
  one_hot_max_size:
    type: "int"
    bounds: [2, 25]  # Порог, после которого CatBoost переходит с one-hot на ctr-кодирование

  # ============================================================
  # ДИСБАЛАНС КЛАССОВ
  # ============================================================
  scale_pos_weight:  # Добавляем веса классов прямо в общий пул тюнинга разом!
    type: "float"
    bounds: [15.0, 60.0]  # Центрировано вокруг фактического neg/pos ≈ 31, без ухода в переоценку
    log: false